name: 'Сборка и публикация релиза'
on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Установка Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Установка зависимостей фронтенда
        run: npm install

      - name: Сборка sidecar (если нужен)
        run: npm run sidecar
        shell: bash

      - name: Сборка и публикация Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: 'Электра-АС печать пропусков v__VERSION__'
          releaseBody: |            
            - Список изменений
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}